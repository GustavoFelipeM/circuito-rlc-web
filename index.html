<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Circuito RLC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .btn-export { background-color: #28a745; margin-left: 10px; }
        .btn-export:hover { background-color: #218838; }
        .canvas-container { margin-top: 30px; position: relative; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Circuito RLC em Série</h2>
    <p>Altere os valores abaixo para recalcular os 10.000 pontos em tempo real.</p>
    
    <div class="controles">
        <div>
            <label for="resistencia">Resistência (R - Ω):</label>
            <input type="number" id="resistencia" value="10" step="0.1">
        </div>
        <div>
            <label for="indutancia">Indutância (L - H):</label>
            <input type="number" id="indutancia" value="0.1" step="0.01">
        </div>
        <div>
            <label for="capacitancia">Capacitância (C - F):</label>
            <input type="number" id="capacitancia" value="0.001" step="0.0001">
        </div>
        <div>
            <label for="tensao">Tensão Fonte (V_in):</label>
            <input type="number" id="tensao" value="5" step="0.5">
        </div>
    </div>

    <button id="btnCalcular">Simular Circuito</button>
    <button id="btnExportar" class="btn-export">Exportar CSV</button>

    <div class="canvas-container">
        <canvas id="graficoRLC"></canvas>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
