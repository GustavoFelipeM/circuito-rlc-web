<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Circuito RLC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Simulador de Circuito RLC em Série</h2>
    <p>Altere os valores abaixo para recalcular os 10.000 pontos em tempo real.</p>
    
    <div class="controles">
        <div>
            <label for="resistencia">Resistência (R):</label>
            <div class="input-group">
                <input type="number" id="resistencia" value="10" step="0.1">
                <select id="unidade-resistencia">
                    <option value="1">Ω</option>
                    <option value="1e3">kΩ</option>
                    <option value="1e6">MΩ</option>
                </select>
            </div>
        </div>
        <div>
            <label for="indutancia">Indutância (L):</label>
            <div class="input-group">
                <input type="number" id="indutancia" value="100" step="1">
                <select id="unidade-indutancia">
                    <option value="1">H</option>
                    <option value="1e-3" selected>mH</option>
                    <option value="1e-6">µH</option>
                </select>
            </div>
        </div>
        <div>
            <label for="capacitancia">Capacitância (C):</label>
            <div class="input-group">
                <input type="number" id="capacitancia" value="100" step="1">
                <select id="unidade-capacitancia">
                    <option value="1">F</option>
                    <option value="1e-3">mF</option>
                    <option value="1e-6" selected>µF</option>
                    <option value="1e-9">nF</option>
                </select>
            </div>
        </div>

        <div class="fonte-container">
            <label>Tipo de Fonte de Tensão:</label>
            <div class="toggle-switch-wrapper">
                <span class="toggle-label mode-dc">DC</span>
                <label class="switch">
                    <input type="checkbox" id="switch-fonte">
                    <span class="slider round"></span>
                </label>
                <span class="toggle-label mode-ac">AC</span>
            </div>
        </div>
    </div>

    <div class="panel-fonte-expandido" id="painel-dc" style="display: block;">
        <div class="panel-grid-dc">
            <div>
                <label for="tensao_dc">Tensão Contínua (V_dc):</label>
                <div class="input-group">
                    <input type="number" id="tensao_dc" value="12" step="0.5">
                    <select id="unidade-tensao-dc">
                        <option value="1">V</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-fonte-expandido" id="painel-ac" style="display: none;">
        <div class="panel-grid">
            <div>
                <label for="amplitude_a">Amplitude (A):</label>
                <div class="input-group">
                    <input type="number" id="amplitude_a" value="5" step="0.5">
                    <select id="unidade-amplitude">
                        <option value="1">V</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="freq_fonte">Frequência da Fonte (f):</label>
                <div class="input-group">
                    <input type="number" id="freq_fonte" value="60" step="1">
                    <select id="unidade-frequencia">
                        <option value="1">Hz</option>
                        <option value="1e3">kHz</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="offset_b">Offset Contínuo (B):</label>
                <div class="input-group">
                    <input type="number" id="offset_b" value="0" step="0.5">
                    <select id="unidade-offset">
                        <option value="1">V</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="acoes">
        <button id="btnCalcular">Simular Circuito</button>
        <button id="btnExportar" class="btn-export">Exportar CSV</button>
    </div>

    <div class="dashboard">
        <div class="card"><strong>Amortecimento</strong> <span id="out-tipo">-</span></div>
        <div class="card"><strong>Fator α (Atenuação)</strong> <span id="out-alpha">-</span> <small>rad/s</small></div>
        <div class="card"><strong>Frequência ω₀</strong> <span id="out-omega">-</span> <small>rad/s</small></div>
        <div class="card"><strong>Frequência f₀</strong> <span id="out-f0">-</span> <small>Hz</small></div>
    </div>

    <div class="canvas-container">
        <canvas id="graficoRLC"></canvas>
    </div>

    <div class="rodape">
        Desenvolvido por <span class="autor" onclick="document.getElementById('resto-da-equipe').classList.toggle('visivel')" title="Clique aqui!">Gustavo Felipe</span>
        <div id="resto-da-equipe" class="equipe-secundaria">
            Equipe: Lucas Carvalho, Laura de Lima e Giovanna Costa
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
